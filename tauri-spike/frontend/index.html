<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>Tauri spike</title>
<style>
  body{ margin:0; font-family:"Segoe UI",system-ui,sans-serif; background:#1e1e1e; color:#e8e8e8;
        display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:16px; }
  h1{ color:#0c8ce9; }
  button{ background:#0c8ce9; color:#fff; border:0; border-radius:8px; padding:10px 18px; font-size:15px; cursor:pointer; }
  #out{ color:#9a9a9a; font-size:14px; }
</style>
</head>
<body>
  <h1>Varos — بروفة Tauri</h1>
  <div>لو الزرار ده رجّع رد من Rust، يبقى الـ IPC (طبقة الوصل) شغّالة ✅</div>
  <button id="b">كلّم القلب (Rust)</button>
  <div id="out">—</div>
<script>
  const out = document.getElementById('out');
  document.getElementById('b').addEventListener('click', async () => {
    try {
      const res = await window.__TAURI__.core.invoke('ping', { msg: 'هاي من الويب' });
      out.textContent = 'Rust رد: ' + res;
    } catch (e) { out.textContent = 'خطأ: ' + e; }
  });
</script>
</body>
</html>
